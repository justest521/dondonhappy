/* ══════════════════════════════════════════════════════════════════════════════
   Yahoo Finance — v7 quote + v8 chart · 7 來源競速 Promise.any()
   ⚠️  失敗常見原因：
     1. CORS  — YF 封鎖直接 browser 請求，需走代理
     2. 代理掛掉 — 免費代理服務不穩定（allorigins 最穩）
     3. Claude Artifact 沙盒 — 預覽環境網路受限；部署到 GitHub Pages 後正常
══════════════════════════════════════════════════════════════════════════════ */

const YF_V8 = s => `https://query1.finance.yahoo.com/v8/finance/chart/${s}?interval=1d&range=3mo`;
const YF_V7 = s => `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${s}&fields=regularMarketPrice,regularMarketPreviousClose`;

function buildProxies(sym) {
  const v8 = YF_V8(sym), v7 = YF_V7(sym);
  const e8 = encodeURIComponent(v8), e7 = encodeURIComponent(v7);
  return [
    { url: v8, type: "v8" },
    { url: v7, type: "v7" },
    { url: `https://api.allorigins.win/raw?url=${e8}`, type: "v8" },
    { url: `https://api.allorigins.win/raw?url=${e7}`, type: "v7" },
    { url: `https://corsproxy.io/?${e8}`, type: "v8" },
    { url: `https://api.codetabs.com/v1/proxy?quest=${e8}`, type: "v8" },
    { url: `https://proxy.cors.sh/${v8}`, type: "v8" },
  ];
}

function parseV8(j, sym) {
  const q = j?.chart?.result?.[0]; if (!q) throw new Error("no v8 result");
  const closes = q.indicators?.quote?.[0]?.close ?? [];
  const meta = q.meta ?? {};
  const price = meta.regularMarketPrice ?? closes.filter(Boolean).at(-1) ?? 0;
  const prev  = meta.previousClose      ?? closes.filter(Boolean).at(-2) ?? price;
  if (!price) throw new Error("zero price");
  return { sym, price, prev, closes: closes.filter(Boolean) };
}

function parseV7(j, sym) {
  const r = j?.quoteResponse?.result?.[0]; if (!r) throw new Error("no v7 result");
  const price = r.regularMarketPrice ?? 0;
  const prev  = r.regularMarketPreviousClose ?? price;
  if (!price) throw new Error("zero price");
  return { sym, price, prev, closes: [] };
}

async function fetchYahoo(sym) {
  const proxies = buildProxies(sym);
  const ctrls   = proxies.map(() => new AbortController());
  try {
    const result = await Promise.any(
      proxies.map(({ url, type }, i) =>
        fetch(url, { signal: ctrls[i].signal })
          .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
          .then(j => type === "v7" ? parseV7(j, sym) : parseV8(j, sym))
      )
    );
    ctrls.forEach(c => c.abort());
    return result;
  } catch (e) {
    ctrls.forEach(c => c.abort());
    console.warn(`fetchYahoo(${sym}) 全部失敗:`, e?.message ?? e);
    return null;
  }
}

async function fetchAllPrices(syms) {
  const BATCH = 3;
  const out = {};
  for (let i = 0; i < syms.length; i += BATCH) {
    const batch = syms.slice(i, i + BATCH);
    const res   = await Promise.allSettled(batch.map(fetchYahoo));
    res.forEach((r, j) => { out[batch[j]] = r.status === "fulfilled" ? r.value : null; });
  }
  return out;
}

/* UW API — 透過 Cloudflare Worker 代理 */
const UW_WORKER = "https://solitary-wood-898d.justest521.workers.dev";

async function uwFetch(key, endpoint) {
  try {
    const workerUrl = UW_WORKER + endpoint +
      (endpoint.includes("?") ? "&" : "?") + `_key=${encodeURIComponent(key)}`;
    const r = await fetch(workerUrl);
    if (!r.ok) throw new Error("Worker HTTP " + r.status);
    const j = await r.json();
    if (j?.error) throw new Error(j.error);
    return j;
  } catch(e) {
    console.warn("UW Worker fetch failed:", endpoint, e?.message);
    return null;
  }
}

function Spark({data=[],color="#ffa726",w=100,h=36}){
  if(data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*h}`);
  const fill=[...pts,`${w},${h}`,`0,${h}`];
  const gid=`sg${color.replace(/[^a-z0-9]/gi,"")}${w}`;
  return(
    <svg width={w} height={h} style={{overflow:"visible"}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity=".25"/>
        <stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <polygon points={fill.join(" ")} fill={`url(#${gid})`}/>
      <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
      <circle cx={pts[pts.length-1].split(",")[0]} cy={pts[pts.length-1].split(",")[1]} r="3" fill={color}/>
    </svg>
  );
}

   圖表元件

function EqChart({data}){
  const W=640,H=155,pad={t:8,r:8,b:22,l:50};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const vals=data.map(d=>d.v);
  const mn=Math.min(...vals)*.998,mx=Math.max(...vals)*1.002;
  const pts=data.map((d,i)=>`${pad.l+(i/(data.length-1))*iW},${pad.t+(1-(d.v-mn)/(mx-mn))*iH}`);
  const fill=[...pts,`${pad.l+iW},${pad.t+iH}`,`${pad.l},${pad.t+iH}`];
  const ticks=[0,.25,.5,.75,1].map(t=>({y:pad.t+(1-t)*iH,l:((mn+t*(mx-mn))/1000).toFixed(0)+"K"}));
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{fontFamily:"'IBM Plex Mono',monospace"}}>
      <defs><linearGradient id="eqg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#ffa726" stopOpacity=".22"/>
        <stop offset="100%" stopColor="#ffa726" stopOpacity="0"/>
      </linearGradient></defs>
      {ticks.map((t,i)=>(
        <g key={i}>
          <line x1={pad.l} y1={t.y} x2={pad.l+iW} y2={t.y} stroke="#ffffff0c" strokeWidth="1"/>
          <text x={pad.l-6} y={t.y+4} textAnchor="end" fill="#ffffff35" fontSize="10">{t.l}</text>
        </g>
      ))}
      <polygon points={fill.join(" ")} fill="url(#eqg)"/>
      <polyline points={pts.join(" ")} fill="none" stroke="#ffa726" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1].split(",")[0]} cy={pts[pts.length-1].split(",")[1]} r="4" fill="#ffa726" style={{filter:"drop-shadow(0 0 5px #ffa726)"}}/>
    </svg>
  );
}

      // Mar 04, 2026 / March 4, 2026
      /\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*[\s.]+([0-9]{1,2})[,\s]+([0-9]{4})\b/i,

      /\b(20[0-9]{2})[\/-](0?[1-9]|1[0-2])[\/-](0?[1-9]|[12][0-9]|3[01])\b/,
      // 03/04/2026 or 3-4-2026
      /\b(0?[1-9]|1[0-2])[\/-](0?[1-9]|[12][0-9]|3[01])[\/-](20[0-9]{2})\b/,
    ];
    var monthMap = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    for(var i=0;i<patterns.length;i++){
      var m = text.match(patterns[i]);
      if(m){
        try{
          var d;
          if(i===0){
            var mo = monthMap[m[1].toLowerCase().slice(0,3)];
            d = new Date(parseInt(m[3]), mo, parseInt(m[2]));
          } else if(i===1){
            d = new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
          } else {
            d = new Date(parseInt(m[3]), parseInt(m[1])-1, parseInt(m[2]));
          }
          if(!isNaN(d.getTime()) && d.getFullYear()>=2020) return d;
        }catch(e){}
      }
    }

  };

  // ── AI 結果解析成卡片 ──
  const renderAiCards = (text) => {

        if(current && current.lines.length) sections.push(current);

  const analyzeReport = async(reportText, existingReport)=>{

      var dateRangeEnd = recentSnaps.length ? new Date(recentSnaps[0].ts).toLocaleDateString("zh-TW",{month:"2-digit",day:"2-digit"}) : "";
      var histLines = Object.keys(histMap).map(function(sym){
        var h = histMap[sym];

        return sym+" 出現"+h.count+"次（"+dateRangeStart+"～"+dateRangeEnd+"）CALL溢價:"+fmtM(h.callPrem)+" PUT溢價:"+fmtM(h.putPrem)+" 異常:"+h.unusual+"筆 掃單:"+h.sweep+"筆 機構方向:"+bias;
      }).join(NL) || "無相關歷史記錄（快照數："+recentSnaps.length+"）";

      // ── 舊報告驗證模式 ──
      var validationSection = "";
      if(existingReport && existingReport.ts){

        validationSection = [
          "","【⚠️ 報告驗證模式】",

        ].join(NL);

        "你是專業美股期權分析師。分析時間："+nowStr,

        // 自動分類：從報告文字判斷類別

        if(/財報|earnings|revenue|eps|q[1-4]/.test(rt)) cat = "財報";

        else if(/技術分析|support|resistance|突破|ma|rsi|macd|k線/.test(rt)) cat = "技術";

  };

                              （{Math.floor((Date.now()-r.ts)/86400000)}天前）
                            </span>
                            <span onClick={e=>{e.stopPropagation();setReports(prev=>prev.filter(x=>x.id!==r.id));}}
                              style={{color:"#666c84",cursor:"pointer",fontSize:16,padding:"0 4px"}}>×</span>
                          </div>
                        </div>
                        {selectedReport?.id===r.id&&(
                          <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #222334"}}>
                            <div style={{fontSize:16,color:"#8890a8",lineHeight:1.9,marginBottom:r.aiAnalysis?14:0,
                              maxHeight:150,overflow:"auto",whiteSpace:"pre-wrap"}}>{r.content}</div>
                            {r.aiAnalysis&&(
                              <>
                                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                                <div style={{fontSize:12,color:"#00e5a0"}}>⚡ AI 分析</div>
                                <div onClick={e=>{e.stopPropagation();setSelectedReport(null);setReportInput(r.content);setReportTitle(r.title+" [驗證]");analyzeReport(r.content,r);}}
                                  style={{fontSize:11,color:"#ffa726",background:"#ffa72615",border:"1px solid #ffa72630",
                                    padding:"3px 10px",borderRadius:4,cursor:"pointer"}}>
                                  🔄 重新驗證
                                </div>
                              </div>
                                <div>{renderAiCards(r.aiAnalysis)}</div>
                                <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
                                  {["1天後複查","3天後操作","1週後檢視"].map((label,i)=>{
                                    const days=[1,3,7][i];
                                    return(
                                      <div key={label} onClick={e=>{e.stopPropagation();addReminder(`${r.title}：${label}`,days);}}
                                        style={{padding:"4px 10px",background:"#ffa72610",border:"1px solid #ffa72625",
                                          borderRadius:5,cursor:"pointer",fontSize:12,color:"#ffa726"}}>
                                        🔔 {label}
                                      </div>
                                    );
                                  })}
                                </div>
                              </>
                            )}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}
              </React.Fragment>
              )}
            </div>
          )}

        </div>
      </div>
      {/* ════════════════ 登入 Modal ════════════════ */}
      {loginOpen&&(
        <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:9999,
          display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#1c1d26",border:"1px solid #2e3048",borderRadius:14,
            padding:"36px 32px",width:360,boxShadow:"0 20px 60px #000"}}>
            {/* Logo */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:24}}>
              <div style={{width:36,height:36,borderRadius:9,
                background:"linear-gradient(135deg,#ffa726,#ff6d00)",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:900,color:"#000"}}>D</div>
              <div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:900,color:"#f0f0f5"}}>DONDONHAPPY</div>
                <div style={{fontSize:10,color:"#6a7090",letterSpacing:1.5}}>期權 · 量化 · 暗池</div>
              </div>
            </div>

            {/* Tab */}
            <div style={{display:"flex",gap:6,marginBottom:20}}>
              {["login","setup"].map(m=>(
                <div key={m} onClick={()=>{setLoginMode(m);setLoginErr("");}}
                  style={{flex:1,padding:"7px",borderRadius:6,cursor:"pointer",textAlign:"center",fontSize:13,
                    background:loginMode===m?"#ffa72620":"#ffffff08",
                    border:`1px solid ${loginMode===m?"#ffa72650":"#ffffff10"}`,
                    color:loginMode===m?"#ffa726":"#ffffff40",fontWeight:loginMode===m?700:400}}>
                  {m==="login"?"🔐 登入":"⚙️ 首次設定"}
                </div>
              ))}
            </div>

            {loginMode==="login"?(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div style={{fontSize:12,color:"#7880a0"}}>輸入你設定的密碼解鎖 UW API 金鑰</div>
                <input
                  type="password" value={loginPwd}
                  onChange={e=>setLoginPwd(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                  placeholder="密碼" autoFocus
                  style={{padding:"10px 12px",fontSize:14,borderRadius:7,
                    background:"#0a0a0d",border:"1px solid #ffffff20",color:"#f0f0f5"}}/>
                <div onClick={handleLogin}
                  style={{padding:"11px",borderRadius:7,cursor:"pointer",textAlign:"center",
                    background:loginLoading?"#ffffff10":"#ffa72625",
                    border:"1px solid #ffa72650",fontSize:14,color:"#ffa726",fontWeight:700}}>
                  {loginLoading?"解密中…":"登入"}
                </div>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div style={{fontSize:12,color:"#7880a0"}}>設定一組密碼保護你的 UW API 金鑰，儲存於雲端</div>
                <input
                  type="text" value={setupKey}
                  onChange={e=>setSetupKey(e.target.value)}
                  placeholder="UW API 金鑰 (UUID 格式)"
                  style={{padding:"10px 12px",fontSize:13,borderRadius:7,
                    background:"#0a0a0d",border:"1px solid #ffffff20",color:"#f0f0f5"}}/>
                <input
                  type="password" value={setupPwd}
                  onChange={e=>setSetupPwd(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&handleSetup()}
                  placeholder="設定密碼（至少 6 字元）"
                  style={{padding:"10px 12px",fontSize:14,borderRadius:7,
                    background:"#0a0a0d",border:"1px solid #ffffff20",color:"#f0f0f5"}}/>
                <div onClick={handleSetup}
                  style={{padding:"11px",borderRadius:7,cursor:"pointer",textAlign:"center",
                    background:loginLoading?"#ffffff10":"#ffa72625",
                    border:"1px solid #ffa72650",fontSize:14,color:"#ffa726",fontWeight:700}}>
                  {loginLoading?"儲存中…":"加密儲存金鑰"}
                </div>
              </div>
            )}

            {loginErr&&(
              <div style={{marginTop:12,padding:"8px 12px",borderRadius:6,fontSize:12,
                background:loginErr.startsWith("✅")?"#00e5a010":"#ff4d6d10",
                border:`1px solid ${loginErr.startsWith("✅")?"#00e5a030":"#ff4d6d30"}`,
                color:loginErr.startsWith("✅")?"#00e5a0":"#ff4d6d"}}>
                {loginErr}
              </div>
            )}

            {/* 跳過 */}
            <div onClick={()=>setLoginOpen(false)}
              style={{marginTop:16,textAlign:"center",fontSize:12,color:"#666c84",cursor:"pointer"}}>
              略過，使用模擬數據
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  /* ── 掛載 ── */
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
  </script>
</body>
</html>
