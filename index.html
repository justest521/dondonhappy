/* ══════════════════════════════════════════════════════════════════════════════
   Yahoo Finance — v7 quote + v8 chart · 7 來源競速 Promise.any()
   ⚠️  失敗常見原因：
     1. CORS  — YF 封鎖直接 browser 請求，需走代理
     2. 代理掛掉 — 免費代理服務不穩定（allorigins 最穩）
     3. Claude Artifact 沙盒 — 預覽環境網路受限；部署到 GitHub Pages 後正常
══════════════════════════════════════════════════════════════════════════════ */

const YF_V8 = s => `https://query1.finance.yahoo.com/v8/finance/chart/${s}?interval=1d&range=3mo`;
const YF_V7 = s => `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${s}&fields=regularMarketPrice,regularMarketPreviousClose`;

function buildProxies(sym) {
  const v8 = YF_V8(sym), v7 = YF_V7(sym);
  const e8 = encodeURIComponent(v8), e7 = encodeURIComponent(v7);
  return [
    { url: v8, type: "v8" },
    { url: v7, type: "v7" },
    { url: `https://api.allorigins.win/raw?url=${e8}`, type: "v8" },
    { url: `https://api.allorigins.win/raw?url=${e7}`, type: "v7" },
    { url: `https://corsproxy.io/?${e8}`, type: "v8" },
    { url: `https://api.codetabs.com/v1/proxy?quest=${e8}`, type: "v8" },
    { url: `https://proxy.cors.sh/${v8}`, type: "v8" },
  ];
}

function parseV8(j, sym) {
  const q = j?.chart?.result?.[0]; if (!q) throw new Error("no v8 result");
  const closes = q.indicators?.quote?.[0]?.close ?? [];
  const meta = q.meta ?? {};
  const price = meta.regularMarketPrice ?? closes.filter(Boolean).at(-1) ?? 0;
  const prev  = meta.previousClose      ?? closes.filter(Boolean).at(-2) ?? price;
  if (!price) throw new Error("zero price");
  return { sym, price, prev, closes: closes.filter(Boolean) };
}

function parseV7(j, sym) {
  const r = j?.quoteResponse?.result?.[0]; if (!r) throw new Error("no v7 result");
  const price = r.regularMarketPrice ?? 0;
  const prev  = r.regularMarketPreviousClose ?? price;
  if (!price) throw new Error("zero price");
  return { sym, price, prev, closes: [] };
}

async function fetchYahoo(sym) {
  const proxies = buildProxies(sym);
  const ctrls   = proxies.map(() => new AbortController());
  try {
    const result = await Promise.any(
      proxies.map(({ url, type }, i) =>
        fetch(url, { signal: ctrls[i].signal })
          .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
          .then(j => type === "v7" ? parseV7(j, sym) : parseV8(j, sym))
      )
    );
    ctrls.forEach(c => c.abort());
    return result;
  } catch (e) {
    ctrls.forEach(c => c.abort());
    console.warn(`fetchYahoo(${sym}) 全部失敗:`, e?.message ?? e);
    return null;
  }
}

async function fetchAllPrices(syms) {
  const BATCH = 3;
  const out = {};
  for (let i = 0; i < syms.length; i += BATCH) {
    const batch = syms.slice(i, i + BATCH);
    const res   = await Promise.allSettled(batch.map(fetchYahoo));
    res.forEach((r, j) => { out[batch[j]] = r.status === "fulfilled" ? r.value : null; });
  }
  return out;
}

/* UW API — 透過 Cloudflare Worker 代理 */
const UW_WORKER = "https://solitary-wood-898d.justest521.workers.dev";

async function uwFetch(key, endpoint) {
  try {
    const workerUrl = UW_WORKER + endpoint +
      (endpoint.includes("?") ? "&" : "?") + `_key=${encodeURIComponent(key)}`;
    const r = await fetch(workerUrl);
    if (!r.ok) throw new Error("Worker HTTP " + r.status);
    const j = await r.json();
    if (j?.error) throw new Error(j.error);
    return j;
  } catch(e) {
    console.warn("UW Worker fetch failed:", endpoint, e?.message);
    return null;
  }
}

async function fetchUWFlow(key,limit=30){
  const j = await uwFetch(key, `/api/option-trades/flow-alerts?limit=${limit}`);
  if (!j) return null;
  const rows=j?.data??j?.results??[];
  return rows.slice(0,limit).map((f,i)=>({
    id:i,
    time: f.created_at||f.filled_at||f.time||"",
    sym:  f.ticker||f.ticker_symbol||f.symbol||"—",
    type: (f.type||f.put_call||f.option_type||"CALL").toUpperCase(),
    strike:f.strike||f.strike_price||"—",
    exp:  f.expiry||f.expiry_date||"—",
    prem: Number(f.total_premium||f.total_bid_side_prem||f.premium||0),
    size: Number(f.volume||f.total_size||f.size||0),
    oi:   Number(f.open_interest||0),
    iv:   Number(f.implied_volatility||f.iv||0).toFixed(2),
    sent: (f.sentiment||(f.put_call==="CALL"?"BULLISH":"BEARISH")).toUpperCase(),
    unusual:!!(f.is_unusual||f.unusual),
    sweep:!!(f.is_sweep||f.sweep),
    exchange:f.exchange||f.venue||"—",
  }));
}

async function fetchUWDark(key,limit=20){
  const j = await uwFetch(key, `/api/darkpool/recent?limit=${limit}`);
  if (!j) return null;
  const rows=j?.data??j?.results??[];
  return rows.slice(0,limit).map((d,i)=>({
    id:i,
    time:d.time||d.executed_at||"",
    sym: d.ticker||d.ticker_symbol||d.underlying||d.symbol||"—",

    notional:Number(d.premium||d.notional||(d.price*(d.size||0))||0),
    type:d.trade_type||(Number(d.size||0)>10000?"BLOCK":"DARK"),
    side:(d.side||(Math.random()>.5?"BUY":"SELL")).toUpperCase(),
    venue:d.venue||d.exchange||"—",
  }));
}

function Spark({data=[],color="#ffa726",w=100,h=36}){
  if(data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*h}`);
  const fill=[...pts,`${w},${h}`,`0,${h}`];
  const gid=`sg${color.replace(/[^a-z0-9]/gi,"")}${w}`;
  return(
    <svg width={w} height={h} style={{overflow:"visible"}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity=".25"/>
        <stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <polygon points={fill.join(" ")} fill={`url(#${gid})`}/>
      <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
      <circle cx={pts[pts.length-1].split(",")[0]} cy={pts[pts.length-1].split(",")[1]} r="3" fill={color}/>
    </svg>
  );
}

function EqChart({data}){
  const W=640,H=155,pad={t:8,r:8,b:22,l:50};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const vals=data.map(d=>d.v);
  const mn=Math.min(...vals)*.998,mx=Math.max(...vals)*1.002;
  const pts=data.map((d,i)=>`${pad.l+(i/(data.length-1))*iW},${pad.t+(1-(d.v-mn)/(mx-mn))*iH}`);
  const fill=[...pts,`${pad.l+iW},${pad.t+iH}`,`${pad.l},${pad.t+iH}`];
  const ticks=[0,.25,.5,.75,1].map(t=>({y:pad.t+(1-t)*iH,l:((mn+t*(mx-mn))/1000).toFixed(0)+"K"}));
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{fontFamily:"'IBM Plex Mono',monospace"}}>
      <defs><linearGradient id="eqg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#ffa726" stopOpacity=".22"/>
        <stop offset="100%" stopColor="#ffa726" stopOpacity="0"/>
      </linearGradient></defs>
      {ticks.map((t,i)=>(
        <g key={i}>
          <line x1={pad.l} y1={t.y} x2={pad.l+iW} y2={t.y} stroke="#ffffff0c" strokeWidth="1"/>
          <text x={pad.l-6} y={t.y+4} textAnchor="end" fill="#ffffff35" fontSize="10">{t.l}</text>
        </g>
      ))}
      <polygon points={fill.join(" ")} fill="url(#eqg)"/>
      <polyline points={pts.join(" ")} fill="none" stroke="#ffa726" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1].split(",")[0]} cy={pts[pts.length-1].split(",")[1]} r="4" fill="#ffa726" style={{filter:"drop-shadow(0 0 5px #ffa726)"}}/>
    </svg>
  );
}

      locale:"zh_TW",toolbar_bg:"#0d0d10",enable_publishing:false,
      backgroundColor:"#0d0d10",gridColor:"rgba(255,255,255,0.04)",

      studies:["STD;MACD","STD;RSI","STD;Bollinger_Bands"],
    });
    ref.current.appendChild(s);
  },[symbol]);
  return(
    <div className="tradingview-widget-container" ref={ref} style={{height:"100%"}}>
      <div className="tradingview-widget-container__widget" style={{height:"100%"}}/>
    </div>
  );
}

                    {yfLoading&&<span style={{color:"#ffa72660",marginLeft:8}}>⟳ 更新中</span>}
                  </span>
                  <div onClick={loadPrices} className="chip" style={{fontSize:12,padding:"3px 10px",borderRadius:4,
                    border:"1px solid #ffffff15",color:"#ffffff40",background:"#ffffff06"}}>↻ 刷新</div>
                </div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  {SYMS.slice(0,8).map(sym=>{
                    const q=priceOf(sym);
                    return(
                      <div key={sym} style={{padding:"8px 14px",background:"#0d0d12",border:"1px solid #ffffff0a",borderRadius:8,minWidth:96}}>
                        <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{sym}</div>
                        <div style={{fontSize:18,fontWeight:700,color:"#fff",fontFamily:"'IBM Plex Mono'"}}>{q.price}</div>
                        <div style={{fontSize:13,color:q.color}}>{q.pct}</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* 底部三欄 */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
                <div style={{background:"#131317",border:"1px solid #ffffff0c",borderRadius:10,padding:16}}>
                  <div style={{fontSize:12,color:"#ffffff35",letterSpacing:1,marginBottom:12}}>今日損益明細</div>
                  {[{l:"已實現",v:fmt$(pnl.day+1100),c:"#00e5a0"},{l:"未實現",v:fmt$(pnl.total-pnl.day-1100),c:"#ffa726"},
                    {l:"手續費",v:"-$318",c:"#ff4d6d"},{l:"淨損益",v:fmt$(pnl.day),c:"#00e5a0"}].map(r=>(
                    <div key={r.l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #ffffff06"}}>
                      <span style={{fontSize:14,color:"#ffffff50"}}>{r.l}</span>
                      <span style={{fontSize:14,fontWeight:600,color:r.c}}>{r.v}</span>
                    </div>
                  ))}
                </div>
                <div style={{background:"#131317",border:"1px solid #ffffff0c",borderRadius:10,padding:16}}>
                  <div style={{fontSize:12,color:"#ffffff35",letterSpacing:1,marginBottom:12}}>持倉曝險</div>
                  {[{l:"總曝險",v:`${metrics.exp.toFixed(1)}%`,b:metrics.exp,c:"#ffa726"},
                    {l:"淨曝險",v:`${(metrics.exp*.62).toFixed(1)}%`,b:metrics.exp*.62,c:"#29b6f6"},
                    {l:"Beta曝險",v:`${(metrics.beta*100).toFixed(1)}%`,b:metrics.beta*100,c:"#ab47bc"},
                    {l:"現金",v:`${(100-metrics.exp).toFixed(1)}%`,b:100-metrics.exp,c:"#00e5a0"},
                  ].map(r=>(
                    <div key={r.l} style={{marginBottom:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:13,color:"#ffffff50"}}>{r.l}</span>
                        <span style={{fontSize:13,fontWeight:600,color:r.c}}>{r.v}</span>
                      </div>
                      <div style={{height:4,background:"#ffffff08",borderRadius:2}}>
                        <div style={{width:`${r.b}%`,height:"100%",background:r.c,borderRadius:2,transition:"width .5s"}}/>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{background:"#131317",border:"1px solid #ffffff0c",borderRadius:10,padding:16}}>
                  <div style={{fontSize:12,color:"#ffffff35",letterSpacing:1,marginBottom:12}}>
                    前五大持倉 {yfOk===true&&<span style={{color:"#00e5a060",fontSize:11}}>· 真實報價</span>}
                  </div>
                  {positions.slice(0,5).map(p=>(
                    <div key={p.sym} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #ffffff06"}}>
                      <div style={{display:"flex",alignItems:"center",gap:7}}>
                        <span style={{fontSize:14,fontWeight:700,color:"#fff",width:48}}>{p.sym}</span>
                        <Pill color={p.side==="多頭"?"#00e5a0":"#ff4d6d"}>{p.side}</Pill>
                        {p.live&&<div style={{width:5,height:5,borderRadius:"50%",background:"#00e5a0"}}/>}
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:14,fontWeight:600,color:+p.pnl>=0?"#00e5a0":"#ff4d6d"}}>{+p.pnl>=0?"+":""}{fmt$(+p.pnl)}</div>
                        <div style={{fontSize:12,color:+p.pct>=0?"#00e5a060":"#ff4d6d60"}}>{p.pct}%</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ══════ 期權流 ══════ */}
          {tab==="flow"&&(
            <div className="anim" style={{display:"flex",flexDirection:"column",gap:14}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
                <KCard label="買權溢價" value={fmtM(totalCall)} sub="▲" color="#00e5a0" badge={uwKey?"UW":"模擬"}/>
                <KCard label="賣權溢價" value={fmtM(totalPut)}  sub="▼" color="#ff4d6d" badge={uwKey?"UW":"模擬"}/>
                <KCard label="P/C 比率" value={(totalPut/(totalCall||1)).toFixed(2)} sub={sentBull>55?"偏多傾向":"偏空傾向"} color="#ffa726"/>
                <KCard label="異常訊號" value={flow.filter(f=>f.unusual).length} sub="高溢價" color="#ba68c8" badge="UW"/>
                <KCard label="掃單訂單" value={flow.filter(f=>f.sweep).length}   sub="跨所掃單" color="#29b6f6"/>
              </div>

              <div style={{background:"#131317",border:"1px solid #ffffff0c",borderRadius:10,padding:"12px 16px",display:"flex",alignItems:"center",gap:14}}>
                <span style={{fontSize:14,color:"#00e5a0",minWidth:90}}>買權 {sentBull.toFixed(1)}%</span>
                <div style={{flex:1,height:8,background:"#ff4d6d30",borderRadius:4,overflow:"hidden"}}>
                  <div style={{width:`${sentBull}%`,height:"100%",background:"linear-gradient(90deg,#00e5a0,#00e5a060)",borderRadius:4,transition:"width .6s"}}/>
                </div>
                <span style={{fontSize:14,color:"#ff4d6d",minWidth:90,textAlign:"right"}}>賣權 {(100-sentBull).toFixed(1)}%</span>
                {uwLoading&&<span style={{fontSize:12,color:"#ffa72670"}}>⟳ 更新中</span>}
              </div>

              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                {["全部","CALL","PUT"].map(f=>(
                  <div key={f} onClick={()=>setFFilter(f)} className="chip" style={{padding:"5px 14px",borderRadius:5,fontSize:13,
                    background:fFilter===f?`${f==="CALL"?"#00e5a0":f==="PUT"?"#ff4d6d":"#ffa726"}18`:"#ffffff08",
                    border:`1px solid ${fFilter===f?f==="CALL"?"#00e5a050":f==="PUT"?"#ff4d6d50":"#ffa72650":"#ffffff12"}`,
                    color:fFilter===f?f==="CALL"?"#00e5a0":f==="PUT"?"#ff4d6d":"#ffa726":"#ffffff40"}}>{f}</div>
                ))}
                <div style={{width:1,height:22,background:"#ffffff10"}}/>
                <div onClick={()=>setFUnusual(v=>!v)} className="chip" style={{padding:"5px 14px",borderRadius:5,fontSize:13,
                  background:fUnusual?"#ba68c818":"#ffffff08",border:`1px solid ${fUnusual?"#ba68c850":"#ffffff12"}`,
                  color:fUnusual?"#ba68c8":"#ffffff40"}}>⚡ 僅異常</div>
                <div style={{marginLeft:"auto",display:"flex",gap:5}}>
                  {["時間","溢價"].map(s=>(
                    <div key={s} onClick={()=>setFSort(s)} className="chip" style={{padding:"4px 10px",borderRadius:4,fontSize:12,
                      background:fSort===s?"#ffffff12":"#ffffff06",border:"1px solid #ffffff10",
                      color:fSort===s?"#fff":"#ffffff40"}}>{s}{s==="溢價"?" ↓":""}</div>
                  ))}
                </div>
              </div>

              <div style={{background:"#131317",border:"1px solid #ffffff0c",borderRadius:10,overflow:"hidden"}}>
                <div style={{display:"grid",gridTemplateColumns:"90px 70px 60px 70px 65px 90px 100px 70px 70px 65px 1fr",
                  padding:"10px 16px",borderBottom:"1px solid #ffffff08",fontSize:12,color:"#ffffff30",letterSpacing:1}}>
                  <span>時間</span><span>標的</span><span>類型</span><span>行使價</span><span>到期</span>
                  <span>溢價</span><span>量/未平倉</span><span>隱波</span><span>情緒</span><span>交易所</span><span>標記</span>
                </div>
                <div style={{maxHeight:400,overflow:"auto"}}>
                  {filteredFlow.map(f=>(
                    <div key={f.id} className="tr" style={{display:"grid",
                      gridTemplateColumns:"90px 70px 60px 70px 65px 90px 100px 70px 70px 65px 1fr",
                      padding:"11px 16px",borderBottom:"1px solid #ffffff05",alignItems:"center",
                      background:f.unusual?"#ba68c806":"transparent",transition:"background .12s"}}>
                      <span style={{fontSize:12,color:"#ffffff35"}}>{String(f.time).slice(-8)}</span>
                      <span style={{fontSize:16,fontWeight:700,color:"#fff"}}>{f.sym}</span>
                      <Pill color={typeColor(f.type)}>{f.type}</Pill>
                      <span style={{fontSize:14,color:"#ffffff70"}}>${f.strike}</span>
                      <span style={{fontSize:12,color:"#ffffff50"}}>{String(f.exp).slice(0,7)}</span>
                      <span style={{fontSize:14,fontWeight:600,color:f.prem>500000?"#ffa726":"#ffffff80"}}>{fmtM(f.prem)}</span>
                      <span style={{fontSize:12,color:"#ffffff50"}}>{Number(f.size).toLocaleString()}/{Number(f.oi)>999?(Number(f.oi)/1000).toFixed(0)+"K":f.oi}</span>
                      <span style={{fontSize:13,color:"#ffffff60"}}>{(Number(f.iv)*100).toFixed(0)}%</span>
                      <Pill color={sentColor(f.sent)}>{sentZh(f.sent)}</Pill>
                      <Tag>{f.exchange}</Tag>
                      <div style={{display:"flex",gap:4}}>
                        {f.unusual&&<Pill color="#ba68c8">⚡異常</Pill>}
                        {f.sweep&&<Pill color="#29b6f6">掃單</Pill>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ══════ 暗池 ══════ */}
          {tab==="darkpool"&&(
            <div className="anim" style={{display:"flex",flexDirection:"column",gap:14}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                <KCard label="暗池總成交額" value={fmtM(dark.reduce((a,d)=>a+d.notional,0))} sub="最近成交" color="#ab47bc" badge={uwKey?"UW":"模擬"}/>
                <KCard label="大宗交易"     value={dark.filter(d=>d.type==="BLOCK").length} sub="≥1萬股" color="#ffa726"/>
                <KCard label="最大單筆"     value={fmtM(Math.max(...dark.map(d=>d.notional)))} sub="單筆最高" color="#ff4d6d"/>
                <KCard label="買方比例"     value={`${(dark.filter(d=>d.side==="BUY").length/Math.max(1,dark.length)*100).toFixed(0)}%`} sub="暗池成交量" color="#00e5a0"/>
              </div>
              <div style={{background:"#131317",border:"1px solid #ffffff0c",borderRadius:10,overflow:"hidden"}}>
                <div style={{display:"grid",gridTemplateColumns:"90px 70px 70px 90px 110px 80px 70px 80px",
                  padding:"10px 16px",borderBottom:"1px solid #ffffff08",fontSize:12,color:"#ffffff30",letterSpacing:1}}>
                  <span>時間</span><span>標的</span><span>類型</span><span>成交價</span><span>成交額</span><span>股數</span><span>方向</span><span>場所</span>
                </div>
                <div style={{maxHeight:520,overflow:"auto"}}>
                  {dark.map(d=>(
                    <div key={d.id} className="tr" style={{display:"grid",
                      gridTemplateColumns:"90px 70px 70px 90px 110px 80px 70px 80px",
                      padding:"11px 16px",borderBottom:"1px solid #ffffff05",alignItems:"center",
                      background:d.notional>1e6?"#ab47bc06":"transparent",transition:"background .12s"}}>
                      <span style={{fontSize:12,color:"#ffffff35"}}>{String(d.time).slice(-8)}</span>
                      <span style={{fontSize:16,fontWeight:700,color:"#fff"}}>{d.sym}</span>
                      <Pill color={d.type==="BLOCK"?"#ffa726":"#ab47bc"}>{d.type==="BLOCK"?"大宗":"暗池"}</Pill>
                      <span style={{fontSize:14,color:"#ffffff70"}}>${d.price}</span>
                      <span style={{fontSize:15,fontWeight:600,color:d.notional>1e6?"#ab47bc":"#ffffff80"}}>{fmtM(d.notional)}</span>
                      <span style={{fontSize:13,color:"#ffffff50"}}>{Number(d.shares).toLocaleString()}</span>
                      <Pill color={d.side==="BUY"?"#00e5a0":"#ff4d6d"}>{d.side==="BUY"?"買":"賣"}</Pill>
                      <Tag>{d.venue}</Tag>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ══════ K 線圖 ══════ */}
          {tab==="chart"&&(
            <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",
                borderBottom:"1px solid #ffffff08",background:"#080810",flexShrink:0,flexWrap:"wrap"}}>
                {["NASDAQ:NVDA","NASDAQ:TSLA","NASDAQ:AAPL","NASDAQ:QQQ","NYSE:SPY","NASDAQ:AMZN","NASDAQ:META"].map(s=>(
                  <div key={s} onClick={()=>{setTvSym(s);setTvInput(s);}} className="chip" style={{
                    padding:"5px 12px",borderRadius:5,fontSize:14,
                    background:tvSym===s?"#ffa72618":"#ffffff08",
                    border:`1px solid ${tvSym===s?"#ffa72650":"#ffffff10"}`,
                    color:tvSym===s?"#ffa726":"#ffffff40"}}>{s.split(":")[1]}</div>
                ))}
                <div style={{display:"flex",gap:5,marginLeft:"auto"}}>
                  <input value={tvInput} onChange={e=>setTvInput(e.target.value.toUpperCase())}
                    placeholder="EXCHANGE:TICKER" style={{width:175}}
                    onKeyDown={e=>e.key==="Enter"&&setTvSym(tvInput)}/>
                  <div onClick={()=>setTvSym(tvInput)} style={{padding:"7px 14px",background:"#ffa72620",
                    border:"1px solid #ffa72640",borderRadius:6,cursor:"pointer",fontSize:14,color:"#ffa726"}}>確認</div>
                </div>
              </div>
              <div style={{flex:1}}><TVChart symbol={tvSym}/></div>
            </div>
          )}

          {/* ══════ 策略 ══════ */}
          {tab==="strategies"&&(
            <div className="anim" style={{display:"flex",flexDirection:"column",gap:14}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                <KCard label="啟用策略" value={strats.filter(s=>s.on).length} sub={`共 ${strats.length} 個`}/>
                <KCard label="平均夏普" value={(strats.filter(s=>s.on).reduce((a,s)=>a+s.sharpe,0)/Math.max(1,strats.filter(s=>s.on).length)).toFixed(2)} sub="僅統計啟用" color="#ab47bc"/>
                <KCard label="累計成交" value={strats.reduce((a,s)=>a+s.trades,0).toLocaleString()} sub="全部時間" color="#29b6f6"/>
                <KCard label="最佳夏普" value={Math.max(...strats.map(s=>s.sharpe)).toFixed(2)} sub={strats.find(s=>s.sharpe===Math.max(...strats.map(s=>s.sharpe)))?.name} color="#00e5a0"/>
              </div>
              <div style={{background:"#131317",border:"1px solid #ffffff0c",borderRadius:10,overflow:"hidden"}}>
                <div style={{display:"grid",gridTemplateColumns:"1.5fr 80px 90px 55px 75px 90px 90px 55px",
                  padding:"10px 18px",borderBottom:"1px solid #ffffff08",fontSize:12,color:"#ffffff30",letterSpacing:1}}>
                  <span>策略名稱</span><span>類型</span><span>股票池</span><span>週期</span><span>夏普</span><span>最大回撤</span><span>成交次數</span><span>開關</span>
                </div>
                {strats.map(s=>(
                  <div key={s.id} className="tr" style={{display:"grid",
                    gridTemplateColumns:"1.5fr 80px 90px 55px 75px 90px 90px 55px",
                    padding:"15px 18px",borderBottom:"1px solid #ffffff05",alignItems:"center",
                    opacity:s.on?1:.45,transition:"all .12s"}}>
                    <div style={{fontSize:15,fontWeight:600,color:s.on?"#fff":"#ffffff55"}}>{s.name}</div>
                    <Tag color="#ffa72680">{s.type}</Tag>
                    <span style={{fontSize:14,color:"#ffffff50"}}>{s.uni}</span>
                    <span style={{fontSize:14,fontFamily:"monospace",color:"#ffffff50"}}>{s.tf}</span>
                    <span style={{fontSize:15,fontWeight:600,color:"#00e5a0"}}>{s.sharpe}</span>
                    <span style={{fontSize:15,color:"#ff4d6d"}}>{s.dd}%</span>
                    <span style={{fontSize:14,color:"#ffffff60"}}>{s.trades.toLocaleString()}</span>
                    <Toggle on={s.on} onChange={()=>setStrats(st=>st.map(x=>x.id===s.id?{...x,on:!x.on}:x))}/>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ══════ 訊號 ══════ */}
          {tab==="signals"&&(
            <div className="anim" style={{display:"flex",flexDirection:"column",gap:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:13,color:"#ffffff35",letterSpacing:1}}>即時訊號串流（量化策略輸出）</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:"#00e5a0",animation:"pulse 1.5s infinite"}}/>
                  <span style={{fontSize:13,color:"#00e5a0"}}>串流中 · {sigs.filter(s=>!s.filled).length} 筆待成交</span>
                </div>
              </div>
              <div style={{background:"#131317",border:"1px solid #ffffff0c",borderRadius:10,overflow:"hidden"}}>
                <div style={{display:"grid",gridTemplateColumns:"110px 75px 65px 100px 160px 1fr 100px",
                  padding:"10px 16px",borderBottom:"1px solid #ffffff08",fontSize:12,color:"#ffffff30",letterSpacing:1}}>
                  <span>時間</span><span>標的</span><span>訊號</span><span>價格</span><span>策略</span><span></span><span>狀態</span>
                </div>
                <div style={{maxHeight:520,overflow:"auto"}}>
                  {sigs.map((s,i)=>(
                    <div key={`${s.id}-${tick}`} className="sig tr" style={{display:"grid",
                      gridTemplateColumns:"110px 75px 65px 100px 160px 1fr 100px",
                      padding:"13px 16px",borderBottom:"1px solid #ffffff05",alignItems:"center",
                      opacity:i>10?.3:1,transition:"background .12s"}}>
                      <span style={{fontSize:13,fontFamily:"monospace",color:"#ffffff30"}}>{s.time}</span>
                      <span style={{fontSize:16,fontWeight:700,color:"#fff"}}>{s.sym}</span>
                      <span style={{fontSize:14,fontWeight:700,color:s.color}}>{s.type}</span>
                      <span style={{fontSize:15,fontFamily:"monospace",color:"#ffffff60"}}>${s.price}</span>
                      <Tag color="#ffa72660">{s.strat}</Tag>
                      <span/>
                      <span style={{fontSize:13,color:s.filled?"#00e5a0":"#ffa726"}}>{s.filled?"✓ 已成交":"⟳ 待成交"}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ══════ 風控 ══════ */}
          {tab==="risk"&&(
            <div className="anim" style={{display:"flex",flexDirection:"column",gap:14}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                {[
                  {label:"VaR (95%)",    value:"-$12,400",sub:"1日歷史模擬",  color:"#ff4d6d"},
                  {label:"組合 Beta",    value:metrics.beta.toFixed(2),sub:"對比 SPY",color:"#ffa726"},
                  {label:"SPY 相關係數", value:"0.28",    sub:"30日滾動",     color:"#29b6f6"},
                  {label:"板塊集中度",   value:"34%",     sub:"科技類",       color:"#ab47bc"},
                  {label:"槓桿倍數",     value:"1.2×",   sub:"總曝險/NAV",   color:"#ffa726"},
                  {label:"流動性評級",   value:"A+",      sub:"清倉天數 <1",  color:"#00e5a0"},
                ].map(c=><KCard key={c.label} {...c}/>)}
              </div>
              <div style={{background:"#131317",border:"1px solid #ffffff0c",borderRadius:10,padding:20}}>
                <div style={{fontSize:13,color:"#ffffff35",letterSpacing:1,marginBottom:16}}>風控限額監控</div>
                {[
                  {l:"單一持倉上限",   used:4.2,        limit:10,  u:"% NAV"},
                  {l:"總曝險上限",     used:metrics.exp, limit:120, u:"% NAV"},
                  {l:"板塊集中度上限", used:34,          limit:40,  u:"%"},
                  {l:"日虧損上限",     used:.8,          limit:2,   u:"% NAV"},
                  {l:"期權Delta曝險",  used:12.3,        limit:25,  u:"% NAV"},
                  {l:"掛單數量上限",   used:3,           limit:20,  u:"筆"},
                ].map(r=>{
                  const p=limPct(r.used,r.limit);
                  const c=p>85?"#ff4d6d":p>65?"#ffa726":"#00e5a0";
                  return(
                    <div key={r.l} style={{marginBottom:16}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                        <span style={{fontSize:15,color:"#ffffff70"}}>{r.l}</span>
                        <span style={{fontSize:14,fontFamily:"monospace"}}>
                          <span style={{color:c}}>{r.used}{r.u}</span>
                          <span style={{color:"#ffffff25"}}> / {r.limit}{r.u}</span>
                        </span>
                      </div>
                      <div style={{height:5,background:"#ffffff08",borderRadius:3}}>
                        <div style={{width:`${p}%`,height:"100%",background:c,borderRadius:3,
                          transition:"width .5s",boxShadow:`0 0 8px ${c}45`}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

  /* ── 掛載 ── */
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
  </script>
</body>
</html>
